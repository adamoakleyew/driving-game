<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawn Racer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; font-family: 'Rajdhani', sans-serif;
    overflow: hidden; user-select: none;
  }
  #game-wrapper { position: relative; }
  canvas { display: block; border-radius: 8px; }

  /* ── Overlay base ── */
  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0,0,0,0.85); color: #fff; border-radius: 8px;
    backdrop-filter: blur(8px); overflow-y: auto; padding: 20px 0;
  }
  #overlay.hidden { display: none; }
  #overlay::-webkit-scrollbar { width: 4px; }
  #overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  /* ── Title ── */
  .title {
    font-family: 'Orbitron', sans-serif; font-size: 52px; font-weight: 900;
    background: linear-gradient(135deg, #4CAF50, #8BC34A, #FFEB3B);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 2px; letter-spacing: 3px;
  }
  .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; color: #666; letter-spacing: 6px; margin-bottom: 20px;
  }
  .screen-title {
    font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700;
    color: #fff; letter-spacing: 3px; margin-bottom: 16px;
  }

  /* ── Coins display ── */
  .coins-hdr {
    font-family: 'Orbitron', sans-serif; font-size: 16px;
    color: #FFD700; margin: 8px 0 16px; letter-spacing: 1px;
  }
  .coin-icon {
    display: inline-block; width: 18px; height: 18px; background: #FFD700;
    border-radius: 50%; font-size: 11px; line-height: 18px; text-align: center;
    color: #8B6914; font-weight: 900; vertical-align: middle; margin-right: 4px;
  }

  /* ── Buttons ── */
  .btn {
    padding: 14px 44px; font-size: 17px; font-family: 'Orbitron', sans-serif;
    font-weight: 700; border: none; border-radius: 25px; cursor: pointer;
    transition: all 0.25s; letter-spacing: 2px; margin: 5px 0;
  }
  .btn:hover { transform: scale(1.05); filter: brightness(1.15); }
  .btn:active { transform: scale(0.97); }
  .btn-play { background: linear-gradient(135deg, #4CAF50, #66BB6A); color: #fff; box-shadow: 0 0 25px rgba(76,175,80,0.3); }
  .btn-store { background: linear-gradient(135deg, #FF9800, #FFB74D); color: #fff; box-shadow: 0 0 25px rgba(255,152,0,0.3); }
  .btn-back { background: rgba(255,255,255,0.08); color: #888; border: 1px solid rgba(255,255,255,0.15); padding: 10px 30px; font-size: 13px; }
  .btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  .btn-retry { background: linear-gradient(135deg, #ff4444, #ff6600); color: #fff; box-shadow: 0 0 25px rgba(255,68,68,0.3); }
  .btn-next { background: linear-gradient(135deg, #4CAF50, #8BC34A); color: #fff; box-shadow: 0 0 25px rgba(76,175,80,0.3); }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }

  /* ── Controls ── */
  .controls-grid {
    display: grid; grid-template-columns: auto auto;
    gap: 5px 16px; margin-bottom: 18px; font-size: 14px;
  }
  .key {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; padding: 2px 10px; font-family: 'Orbitron', sans-serif;
    font-size: 10px; text-align: center; color: #ddd;
  }
  .action { color: #999; font-size: 13px; }

  /* ── Level Select ── */
  .level-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    width: 100%; max-width: 500px; padding: 0 20px; margin-bottom: 14px;
  }
  .level-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 14px 12px; cursor: pointer; transition: all 0.25s;
    text-align: center; position: relative;
  }
  .level-card:hover:not(.locked) { background: rgba(255,255,255,0.1); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
  .level-card.locked { opacity: 0.35; cursor: not-allowed; }
  .level-card.completed { border-color: rgba(76,175,80,0.4); }
  .level-num {
    font-family: 'Orbitron', sans-serif; font-size: 11px; color: #666;
    letter-spacing: 2px; margin-bottom: 2px;
  }
  .level-name { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #fff; margin-bottom: 3px; }
  .level-desc { font-size: 12px; color: #888; margin-bottom: 6px; }
  .level-target { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #4fc3f7; }
  .level-reward { font-size: 11px; color: #FFD700; margin-top: 3px; }
  .level-stars-display { margin-top: 5px; font-size: 16px; letter-spacing: 2px; }
  .star-on { color: #FFD700; }
  .star-off { color: #333; }
  .lock-icon { font-size: 28px; color: #555; margin: 8px 0; }

  /* ── Store ── */
  .store-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .store-tab {
    padding: 8px 24px; font-family: 'Orbitron', sans-serif; font-size: 11px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; color: #666; cursor: pointer; transition: all 0.2s;
    letter-spacing: 1px;
  }
  .store-tab:hover { color: #aaa; border-color: rgba(255,255,255,0.2); }
  .store-tab.active { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.25); }
  .store-content { width: 100%; max-width: 500px; padding: 0 16px; }

  .upgrade-item {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 12px 14px; margin: 6px 0;
  }
  .upgrade-icon { font-size: 22px; margin-right: 12px; }
  .upgrade-info { flex: 1; }
  .upgrade-name { font-family: 'Orbitron', sans-serif; font-size: 12px; color: #fff; }
  .upgrade-desc { font-size: 11px; color: #777; margin-top: 1px; }
  .upgrade-pips { display: flex; gap: 3px; margin-top: 5px; }
  .pip { width: 24px; height: 5px; border-radius: 2px; background: rgba(255,255,255,0.1); }
  .pip.filled { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
  .buy-btn {
    padding: 7px 14px; font-family: 'Orbitron', sans-serif; font-size: 10px;
    background: linear-gradient(135deg, #FFD700, #FFA000); color: #333;
    border: none; border-radius: 14px; cursor: pointer; font-weight: 700;
    white-space: nowrap; margin-left: 10px; transition: all 0.2s;
  }
  .buy-btn:hover { filter: brightness(1.15); transform: scale(1.05); }
  .buy-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: none; transform: none; }
  .buy-btn.maxed { background: #4CAF50; color: #fff; cursor: default; }

  .color-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    width: 100%; max-width: 340px; margin: 0 auto 16px;
  }
  .color-swatch {
    aspect-ratio: 1; border-radius: 12px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.2s; border: 3px solid transparent; position: relative;
    min-height: 60px;
  }
  .color-swatch:hover:not(.locked) { transform: scale(1.08); }
  .color-swatch.selected { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.25); }
  .color-swatch .swatch-name { font-size: 9px; font-family: 'Orbitron'; color: rgba(255,255,255,0.8); margin-top: 4px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  .color-swatch .swatch-cost { font-size: 9px; font-family: 'Orbitron'; color: #FFD700; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  .color-swatch.locked { opacity: 0.6; }
  .color-swatch .check { font-size: 18px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }

  /* ── Stats ── */
  .stat-row { display: flex; gap: 24px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
  .stat { text-align: center; }
  .stat-val { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #777; letter-spacing: 2px; }
  .gameover-title { font-family: 'Orbitron', sans-serif; font-size: 38px; font-weight: 900; color: #ff4444; margin-bottom: 12px; }
  .complete-title { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; color: #4CAF50; margin-bottom: 6px; }
  .reward-text { font-family: 'Orbitron', sans-serif; font-size: 16px; color: #FFD700; margin: 8px 0; }
  .stars-big { font-size: 40px; letter-spacing: 8px; margin: 8px 0; }
  .hs-text { margin-top: 12px; color: #555; font-size: 12px; font-family: 'Orbitron'; letter-spacing: 2px; }
  .new-hs {
    font-family: 'Orbitron', sans-serif; font-size: 13px;
    color: #ffcc00; margin-top: 6px; letter-spacing: 2px;
    animation: pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

  /* ── Builder ── */
  .btn-builder { background: linear-gradient(135deg, #7C4DFF, #B388FF); color: #fff; box-shadow: 0 0 25px rgba(124,77,255,0.3); }
  .builder-form { width: 100%; max-width: 500px; padding: 0 20px; }
  .builder-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .builder-row label {
    font-family: 'Orbitron', sans-serif; font-size: 10px; color: #aaa;
    min-width: 90px; letter-spacing: 1px;
  }
  .builder-row input[type="text"],
  .builder-row input[type="number"] {
    flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 8px 12px; color: #fff; font-family: 'Rajdhani', sans-serif;
    font-size: 14px; outline: none;
  }
  .builder-row input:focus { border-color: rgba(124,77,255,0.5); }
  .builder-row input[type="color"] { width: 40px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: transparent; }
  .builder-row input[type="range"] { flex: 1; accent-color: #7C4DFF; }
  .builder-row .range-val { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #7C4DFF; min-width: 30px; text-align: right; }
  .builder-section-title {
    font-family: 'Orbitron', sans-serif; font-size: 11px; color: #666;
    letter-spacing: 2px; margin: 12px 0 6px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 4px;
  }
  .builder-preview { width: 100%; height: 60px; border-radius: 8px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
  .custom-section-title { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #B388FF; letter-spacing: 2px; margin: 14px 0 8px; }
  .custom-level-row {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(124,77,255,0.08); border: 1px solid rgba(124,77,255,0.15);
    border-radius: 10px; padding: 10px 14px; margin: 4px 0;
  }
  .custom-level-name { font-family: 'Orbitron', sans-serif; font-size: 12px; color: #fff; }
  .custom-level-desc { font-size: 11px; color: #888; }
  .custom-level-actions { display: flex; gap: 6px; }
  .custom-level-actions button {
    padding: 5px 12px; font-family: 'Orbitron', sans-serif; font-size: 9px;
    border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: all 0.2s;
  }
  .custom-play-btn { background: #7C4DFF; color: #fff; }
  .custom-play-btn:hover { filter: brightness(1.2); }
  .custom-del-btn { background: rgba(255,68,68,0.2); color: #ff5252; }
  .custom-del-btn:hover { background: rgba(255,68,68,0.4); }
  .custom-tag { font-family:'Orbitron'; font-size:8px; color:#B388FF; letter-spacing:2px; background:rgba(124,77,255,0.15); padding:2px 8px; border-radius:8px; }

  /* ── Audio Toggle ── */
  .audio-toggle {
    position: absolute; top: 8px; right: 8px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.2s; z-index: 10;
  }
  .audio-toggle:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div id="game-wrapper">

  <div id="overlay"></div>
  <div class="audio-toggle" onclick="toggleAudio()" id="audioBtn">&#x1F50A;</div>
</div>
<script>
// ─── SETUP ──────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const W = canvas.width, H = canvas.height;

// ─── ROAD CONSTANTS ─────────────────────────────────────
const ROAD_L = 90, ROAD_R = W - 90;
const ROAD_W = ROAD_R - ROAD_L;
const LANES = 4, LANE_W = ROAD_W / LANES;
const PLAYER_W = 42, PLAYER_H = 74;

// ─── LEVELS ─────────────────────────────────────────────
const LEVELS = [

    road: ['#444','#555','#444'], rumble: '#cc3333',
    trafficMult: 1.0, obstacleMult: 0.7, speedMult: 1.0, diffRate: 7000, night: false },
  { name: 'Construction Zone', desc: 'Watch for barriers!', target: 2000, reward: 120,
    skyTop: '#f8a035', skyBot: '#c4723a', grass: '#8B7355', grassAlt: 'rgba(120,95,65,0.35)',

    road: ['#1a1a1a','#222','#1a1a1a'], rumble: '#882222',
    trafficMult: 1.3, obstacleMult: 1.0, speedMult: 1.1, diffRate: 6000, night: true },
  { name: 'Rush Hour', desc: 'Maximum traffic!', target: 4500, reward: 200,
    skyTop: '#c33764', skyBot: '#1d2671', grass: '#1a3d1a', grassAlt: 'rgba(30,50,30,0.4)',
    road: ['#2a2a2a','#3a3a3a','#2a2a2a'], rumble: '#cc3333',
    trafficMult: 2.0, obstacleMult: 1.3, speedMult: 1.15, diffRate: 5000, night: false },
  { name: 'Foggy Morning', desc: 'Mist and mystery', target: 3500, reward: 160,
    skyTop: '#a8b5c0', skyBot: '#8a9ba8', grass: '#3a6b3a', grassAlt: 'rgba(60,110,60,0.3)',
    road: ['#5a5a5a','#6a6a6a','#5a5a5a'], rumble: '#aa5555',
    trafficMult: 1.2, obstacleMult: 1.5, speedMult: 0.95, diffRate: 6000, night: false, fog: true },
  { name: 'Country Road', desc: 'Winding and wild', target: 4000, reward: 180,
    skyTop: '#87CEEB', skyBot: '#98D098', grass: '#228B22', grassAlt: 'rgba(40,140,40,0.4)',
    road: ['#6a5a4a','#7a6a5a','#6a5a4a'], rumble: '#886633',
    trafficMult: 0.9, obstacleMult: 1.8, speedMult: 1.05, diffRate: 5500, night: false },
  { name: 'Rainy Day', desc: 'Slippery when wet', target: 5000, reward: 220,
    skyTop: '#3a3f47', skyBot: '#2a3540', grass: '#1a4a2a', grassAlt: 'rgba(30,70,40,0.35)',
    road: ['#333840','#3a4048','#333840'], rumble: '#556677',
    trafficMult: 1.3, obstacleMult: 2.0, speedMult: 1.1, diffRate: 5000, night: false, rain: true },
  { name: 'Desert Dash', desc: 'Scorching heat', target: 5500, reward: 250,
    skyTop: '#ff9966', skyBot: '#ff5e62', grass: '#c2a645', grassAlt: 'rgba(180,160,60,0.3)',
    road: ['#8a7a60','#9a8a70','#8a7a60'], rumble: '#cc8833',
    trafficMult: 1.5, obstacleMult: 1.6, speedMult: 1.2, diffRate: 4500, night: false },
  { name: 'Sunset Strip', desc: 'Golden hour grind', target: 6000, reward: 280,
    skyTop: '#ff6b35', skyBot: '#7b2ff7', grass: '#2a4a1a', grassAlt: 'rgba(40,70,30,0.4)',
    road: ['#2a2030','#3a3040','#2a2030'], rumble: '#cc4444',
    trafficMult: 1.8, obstacleMult: 1.5, speedMult: 1.15, diffRate: 4500, night: false },
  { name: 'Arctic Freeze', desc: 'Ice cold chaos', target: 7000, reward: 320,
    skyTop: '#d4e5f7', skyBot: '#a0c4e8', grass: '#e8e8f0', grassAlt: 'rgba(200,210,230,0.3)',
    road: ['#8899aa','#99aabb','#8899aa'], rumble: '#4488aa',
    trafficMult: 1.6, obstacleMult: 2.0, speedMult: 1.2, diffRate: 4000, night: false },
  { name: 'Endless Mow', desc: 'No finish line', target: Infinity, reward: 0,
    skyTop: '#0d1b2a', skyBot: '#1b3a1b', grass: '#1a3d1a', grassAlt: 'rgba(30,70,30,0.4)',
    road: ['#2a2a2a','#3a3a3a','#2a2a2a'], rumble: '#cc3333',
    trafficMult: 1.2, obstacleMult: 1.0, speedMult: 1.0, diffRate: 6000, night: false },
];

// ─── STORE CONFIG ───────────────────────────────────────
const UPGRADES = [
  { key: 'speed', name: 'Top Speed', desc: 'Higher max speed', maxLv: 5, costs: [40, 80, 150, 250, 400] },
  { key: 'nitroTank', name: 'Nitro Tank', desc: 'Larger fuel capacity', maxLv: 5, costs: [30, 60, 120, 200, 350] },
  { key: 'nitroRegen', name: 'Nitro Regen', desc: 'Faster recharge', maxLv: 5, costs: [35, 70, 140, 230, 380] },
  { key: 'handling', name: 'Handling', desc: 'Tighter steering', maxLv: 5, costs: [25, 50, 100, 180, 300] },
  { key: 'armor', name: 'Armor', desc: 'Survive a crash', maxLv: 3, costs: [100, 250, 500] },
];

const MOWER_COLORS = [
  { name: 'Green', hex: '#4CAF50', cost: 0 },
  { name: 'Red', hex: '#f44336', cost: 0 },
  { name: 'Blue', hex: '#2196F3', cost: 30 },
  { name: 'Yellow', hex: '#FFEB3B', cost: 30 },
  { name: 'Orange', hex: '#FF9800', cost: 40 },
  { name: 'Purple', hex: '#9C27B0', cost: 50 },
  { name: 'Cyan', hex: '#00BCD4', cost: 50 },
  { name: 'Hot Pink', hex: '#E91E63', cost: 60 },
  { name: 'Midnight', hex: '#263238', cost: 60 },
  { name: 'White', hex: '#ECEFF1', cost: 70 },
  { name: 'Gold', hex: '#FFD700', cost: 120 },
  { name: 'Diamond', hex: '#B2EBF2', cost: 200 },
];

// ─── PERSISTENCE ────────────────────────────────────────
const DEFAULT_DATA = {
  coins: 0, highScore: 0, selectedColor: 0,
  unlockedColors: [0, 1],
  upgrades: { speed: 0, nitroTank: 0, nitroRegen: 0, handling: 0, armor: 0 },
  levelsCompleted: [], levelStars: {},
};
function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem('lawnRacerSave'));
    if (!d) return { ...DEFAULT_DATA };
    return {
      ...DEFAULT_DATA, ...d,
      upgrades: { ...DEFAULT_DATA.upgrades, ...(d.upgrades || {}) },
      unlockedColors: d.unlockedColors || [0, 1],
      levelsCompleted: d.levelsCompleted || [],
      levelStars: d.levelStars || {},
    };
  } catch { return { ...DEFAULT_DATA }; }
}
function saveData() { localStorage.setItem('lawnRacerSave', JSON.stringify(pData)); }
let pData = loadData();

function getUpgradeVal(key) {
  const lv = pData.upgrades[key];
  switch (key) {
    case 'speed': return lv * 1.5;
    case 'nitroTank': return lv * 25;
    case 'nitroRegen': return lv * 0.08;
    case 'handling': return lv * 0.6;
    case 'armor': return lv;
  }
  return 0;
}

// ─── CUSTOM LEVELS ──────────────────────────────────────
function loadCustomLevels() {
  try { return JSON.parse(localStorage.getItem('lawnRacerCustomLevels')) || []; }
  catch { return []; }
}
function saveCustomLevels(arr) { localStorage.setItem('lawnRacerCustomLevels', JSON.stringify(arr)); }
let customLevels = loadCustomLevels();

// ─── AUDIO SYSTEM ───────────────────────────────────────
let audioCtx = null, masterGain = null, musicGainNode = null;
let audioEnabled = true, musicPlaying = false, musicInterval = null;

function initAudio() {
  if (audioCtx) { audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  masterGain.connect(audioCtx.destination);
  musicGainNode = audioCtx.createGain();
  musicGainNode.gain.value = 0.25;
  musicGainNode.connect(masterGain);
}

function toggleAudio() {
  audioEnabled = !audioEnabled;
  document.getElementById('audioBtn').innerHTML = audioEnabled ? '&#x1F50A;' : '&#x1F507;';
  if (!audioEnabled) stopMusic();
  if (audioEnabled && state === 'playing') startMusic();
}

function playTone(freq, dur, type, vol, dest) {
  if (!audioCtx || !audioEnabled) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g); g.connect(dest || masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + dur + 0.05);
}

function playNoise(dur, vol) {
  if (!audioCtx || !audioEnabled) return;
  const len = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(g); g.connect(masterGain); src.start();
}

function sfxPickup() { playTone(880, 0.08, 'sine', 0.2); setTimeout(() => playTone(1175, 0.12, 'sine', 0.15), 60); }
function sfxCrash() { playNoise(0.4, 0.5); playTone(80, 0.3, 'sawtooth', 0.25); }
function sfxObstacle() { playTone(180, 0.15, 'sawtooth', 0.12); playNoise(0.1, 0.15); }
function sfxNitro() { playTone(120, 0.08, 'sawtooth', 0.1); }
function sfxPass() { playTone(700, 0.04, 'sine', 0.06); }
function sfxClick() { playTone(600, 0.06, 'sine', 0.1); }
function sfxBuy() { playTone(440, 0.08, 'sine', 0.15); setTimeout(() => playTone(660, 0.08, 'sine', 0.15), 80); setTimeout(() => playTone(880, 0.12, 'sine', 0.15), 160); }
function sfxLevelComplete() {
  playTone(523, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.25), 120);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.25), 240);
  setTimeout(() => playTone(1047, 0.3, 'sine', 0.3), 360);
}

function startMusic() {
  if (!audioCtx || !audioEnabled || musicPlaying) return;
  musicPlaying = true;
  let beat = 0;
  const bass = [65.41, 65.41, 82.41, 82.41, 73.42, 73.42, 87.31, 87.31];
  musicInterval = setInterval(() => {
    if (!audioEnabled || state !== 'playing') { stopMusic(); return; }
    if (beat % 2 === 0) playTone(bass[beat % bass.length], 0.18, 'triangle', 0.12, musicGainNode);
    if (beat % 4 === 0) playTone(55, 0.12, 'sine', 0.18, musicGainNode);
    if (beat % 2 === 1) playNoise(0.03, 0.06);
    if (beat % 8 === 0) playTone(330 + (beat % 32) * 10, 0.1, 'square', 0.06, musicGainNode);
    beat++;
  }, 180);
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

// ─── HELPERS ────────────────────────────────────────────
function laneX(lane) { return ROAD_L + lane * LANE_W + LANE_W / 2; }
function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2 &&
         ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}
function triggerShake(intensity, dur) { shakeX = intensity; shakeY = intensity; shakeDur = dur; }
function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 60, startY: y });
}
function isLevelUnlocked(i) {
  if (i === 0) return true;
  if (i === LEVELS.length - 1) return pData.levelsCompleted.includes(LEVELS.length - 2);
  return pData.levelsCompleted.includes(i - 1);
}
function starHTML(count) {
  let s = '';
  for (let i = 0; i < 3; i++) s += `<span class="${i < count ? 'star-on' : 'star-off'}">\u2605</span>`;
  return s;
}

function renderStore() {
  let content = '';
  if (storeTab === 'upgrades') {
    for (const u of UPGRADES) {
      const lv = pData.upgrades[u.key];
      const maxed = lv >= u.maxLv;
      const cost = maxed ? 0 : u.costs[lv];
      const canBuy = !maxed && pData.coins >= cost;
      let pips = '';
      for (let i = 0; i < u.maxLv; i++) pips += `<div class="pip ${i < lv ? 'filled' : ''}"></div>`;
      content += `<div class="upgrade-item">
        <div class="upgrade-info">
          <div class="upgrade-name">${u.name}</div>
          <div class="upgrade-desc">${u.desc}</div>
          <div class="upgrade-pips">${pips}</div>
        </div>
        ${maxed
          ? '<button class="buy-btn maxed" disabled>MAX</button>'
          : `<button class="buy-btn" ${canBuy ? '' : 'disabled'} onclick="buyUpgrade('${u.key}')"><span class="coin-icon" style="width:13px;height:13px;font-size:8px;line-height:13px">C</span> ${cost}</button>`
        }
      </div>`;
    }
  } else {
    content = '<div class="color-grid">';
    for (let i = 0; i < MOWER_COLORS.length; i++) {
      const c = MOWER_COLORS[i];
      const owned = pData.unlockedColors.includes(i);
      const selected = pData.selectedColor === i;
      const canBuy = !owned && pData.coins >= c.cost;
      const cls = (selected ? 'selected ' : '') + (!owned ? 'locked' : '');
      const onclick = owned ? `selectColor(${i})` : (canBuy ? `buyColor(${i})` : '');
      content += `<div class="color-swatch ${cls}" style="background:${c.hex}" onclick="${onclick}">
        ${selected ? '<span class="check">\u2713</span>' : ''}
        <span class="swatch-name">${c.name}</span>
        ${!owned ? `<span class="swatch-cost"><span class="coin-icon" style="width:11px;height:11px;font-size:7px;line-height:11px">C</span> ${c.cost}</span>` : ''}
      </div>`;
    }
    content += '</div>';
  }

  overlay.innerHTML = `
    <div class="screen-title">STORE</div>
    <div class="coins-hdr"><span class="coin-icon">C</span> ${pData.coins}</div>
    <div class="store-tabs">
      <button class="store-tab ${storeTab === 'upgrades' ? 'active' : ''}" onclick="showStoreTab('upgrades')">UPGRADES</button>
      <button class="store-tab ${storeTab === 'colors' ? 'active' : ''}" onclick="showStoreTab('colors')">COLORS</button>
    </div>
    <div class="store-content">${content}</div>
    <button class="btn btn-back" style="margin-top:10px" onclick="showMainMenu()">BACK</button>
  `;
}

function showStoreTab(tab) { storeTab = tab; renderStore(); }

function buyUpgrade(key) {
  const u = UPGRADES.find(u => u.key === key);
  const lv = pData.upgrades[key];
  if (lv >= u.maxLv) return;
  const cost = u.costs[lv];
  if (pData.coins < cost) return;
  pData.coins -= cost;
  pData.upgrades[key] = lv + 1;
  saveData();
  renderStore();
}

function buyColor(i) {
  const c = MOWER_COLORS[i];
  if (pData.unlockedColors.includes(i) || pData.coins < c.cost) return;
  pData.coins -= c.cost;
  pData.unlockedColors.push(i);
  pData.selectedColor = i;
  saveData();
  renderStore();
}

function selectColor(i) {
  if (!pData.unlockedColors.includes(i)) return;
  pData.selectedColor = i;
  saveData();
  renderStore();
}

function updateBPreview() {
  for (const id of ['traffic','obstacles','speed','diff']) {
    const el = document.getElementById('b-'+id), v = document.getElementById('b-'+id+'-val');
    if (el && v) v.textContent = el.value;
  }
  const pc = document.getElementById('b-preview');
  if (!pc) return;
  const px = pc.getContext('2d');
  const sT = document.getElementById('b-skyTop').value;
  const sB = document.getElementById('b-skyBot').value;
  const gr = document.getElementById('b-grass').value;
  const rd = document.getElementById('b-road').value;
  const nt = document.getElementById('b-night').checked;
  const g = px.createLinearGradient(0,0,0,60);
  g.addColorStop(0,sT); g.addColorStop(1,sB);
  px.fillStyle = g; px.fillRect(0,0,500,60);
  px.fillStyle = gr; px.fillRect(0,0,80,60); px.fillRect(420,0,80,60);
  px.fillStyle = rd; px.fillRect(80,0,340,60);
  px.strokeStyle = 'rgba(255,255,255,0.3)'; px.lineWidth = 1; px.setLineDash([8,8]);
  for (let i = 1; i < 4; i++) { px.beginPath(); px.moveTo(80+i*85,0); px.lineTo(80+i*85,60); px.stroke(); }
  px.setLineDash([]);
  if (nt) { px.fillStyle = 'rgba(0,0,20,0.5)'; px.fillRect(0,0,500,60); px.fillStyle='#fff'; px.font='bold 10px Orbitron'; px.textAlign='center'; px.fillText('NIGHT MODE',250,35); }
}

function saveBuilderLevel() {
  const name = document.getElementById('b-name').value.trim() || 'Custom Level';
  const desc = document.getElementById('b-desc').value.trim() || 'A custom level';
  const target = parseInt(document.getElementById('b-target').value) || 2000;
  const skyTop = document.getElementById('b-skyTop').value;
  const skyBot = document.getElementById('b-skyBot').value;
  const grass = document.getElementById('b-grass').value;
  const road = document.getElementById('b-road').value;
  const night = document.getElementById('b-night').checked;
  const trafficMult = parseFloat(document.getElementById('b-traffic').value);
  const obstacleMult = parseFloat(document.getElementById('b-obstacles').value);
  const speedMult = parseFloat(document.getElementById('b-speed').value);
  const diffRate = parseInt(document.getElementById('b-diff').value);
  const rr = parseInt(road.slice(1,3),16), rg = parseInt(road.slice(3,5),16), rb = parseInt(road.slice(5,7),16);
  const dk = c => Math.max(0,c-20).toString(16).padStart(2,'0');
  const roadDark = `#${dk(rr)}${dk(rg)}${dk(rb)}`;
  const gR = parseInt(grass.slice(1,3),16), gG = parseInt(grass.slice(3,5),16), gB = parseInt(grass.slice(5,7),16);
  customLevels.push({
    name, desc, target, reward: Math.floor(target / 20),
    skyTop, skyBot, grass, grassAlt: `rgba(${gR},${gG},${gB},0.35)`,
    road: [roadDark, road, roadDark], rumble: '#cc3333',
    trafficMult, obstacleMult, speedMult, diffRate, night,

  sfxBuy();

// ─── START LEVEL ────────────────────────────────────────
function startLevel(index) {
  isCustomLevel = false; customLevelIndex = -1;
  currentLevelIndex = index;
  lvl = LEVELS[index];
  beginLevel();
}

function startCustomLevel(i) {
  const cl = customLevels[i];
  if (!cl) return;
  isCustomLevel = true; customLevelIndex = i;
  currentLevelIndex = -1;
  lvl = cl;
  beginLevel();
}

function beginLevel() {
  state = 'playing';
  initAudio();
  score = 0; combo = 0; maxCombo = 0; mowersAvoided = 0;
  speed = 5; baseSpeed = 5;
  roadOffset = 0; frameCount = 0; difficulty = 0;
  player.x = W / 2; player.y = H - 150; player.tilt = 0;

  nitroMax = 100 + getUpgradeVal('nitroTank');
  nitro = nitroMax; nitroActive = false; nitroCooldown = 0;
  invincible = false; invincibleTimer = 0;
  slowmo = false; slowmoTimer = 0;
  armorHP = getUpgradeVal('armor');
  obstacleHits = 0;
  levelBannerTimer = 120;
  runCoins = 0;

  traffic = []; particles = []; pickups = []; obstacles = []; floatingTexts = [];
  shakeX = 0; shakeY = 0; shakeDur = 0; flashAlpha = 0;
  overlay.classList.add('hidden');
  startMusic();
}

// ─── LEVEL COMPLETE ─────────────────────────────────────
function levelComplete() {
  state = 'levelComplete';
  stopMusic();
  sfxLevelComplete();
  let earnedStars = 1;
  if (maxCombo >= 5) earnedStars = 2;
  if (obstacleHits === 0) earnedStars = 3;

  if (!isCustomLevel) {
    const prev = pData.levelStars[currentLevelIndex] || 0;
    if (earnedStars > prev) pData.levelStars[currentLevelIndex] = earnedStars;
    if (!pData.levelsCompleted.includes(currentLevelIndex)) pData.levelsCompleted.push(currentLevelIndex);
  }

  const baseReward = lvl.reward;
  const scoreBonus = Math.floor(score / 100);
  const starBonus = earnedStars * 10;
  const totalCoins = baseReward + scoreBonus + starBonus;
  runCoins = totalCoins;
  pData.coins += totalCoins;
  if (score > pData.highScore) pData.highScore = score;
  saveData();

  const hasNext = !isCustomLevel && currentLevelIndex < LEVELS.length - 1 && isLevelUnlocked(currentLevelIndex + 1);

  setTimeout(() => {
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <div class="complete-title">LEVEL COMPLETE!</div>
      <div class="stars-big">${starHTML(earnedStars)}</div>
      <div class="stat-row">
        <div class="stat"><div class="stat-val" style="color:#fff">${score}</div><div class="stat-label">SCORE</div></div>
        <div class="stat"><div class="stat-val" style="color:#4fc3f7">${mowersAvoided}</div><div class="stat-label">DODGED</div></div>
        <div class="stat"><div class="stat-val" style="color:#ffcc00">x${maxCombo}</div><div class="stat-label">MAX COMBO</div></div>
      </div>
      <div class="reward-text"><span class="coin-icon">C</span> +${totalCoins}</div>
      <div style="font-size:11px;color:#777;margin-bottom:8px">
        Level: ${baseReward} + Score: ${scoreBonus} + Stars: ${starBonus}
      </div>
      <div class="btn-row">
        ${hasNext ? `<button class="btn btn-next" onclick="startLevel(${currentLevelIndex + 1})">NEXT LEVEL</button>` : ''}
        <button class="btn btn-back" onclick="showLevelSelect()">LEVELS</button>
      </div>
    `;
  }, 400);
}

// ─── GAME OVER ──────────────────────────────────────────
function gameOver() {
  state = 'gameover';
  stopMusic();
  sfxCrash();
  triggerShake(12, 20);
  flashAlpha = 0.8;
  for (let i = 0; i < 40; i++) spawnParticle(player.x, player.y, 'explosion');

  const earnedCoins = Math.floor(score / 200);
  runCoins = earnedCoins;
  pData.coins += earnedCoins;
  if (score > pData.highScore) pData.highScore = score;
  saveData();

  const retryAction = isCustomLevel ? `startCustomLevel(${customLevelIndex})` : `startLevel(${currentLevelIndex})`;

  setTimeout(() => {
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <div class="gameover-title">WRECKED</div>
      <div class="stat-row">
        <div class="stat"><div class="stat-val" style="color:#fff">${score}</div><div class="stat-label">SCORE</div></div>
        <div class="stat"><div class="stat-val" style="color:#4fc3f7">${mowersAvoided}</div><div class="stat-label">DODGED</div></div>
        <div class="stat"><div class="stat-val" style="color:#ffcc00">x${maxCombo}</div><div class="stat-label">MAX COMBO</div></div>
      </div>
      ${earnedCoins > 0 ? `<div class="reward-text"><span class="coin-icon">C</span> +${earnedCoins}</div>` : ''}
      ${lvl.target !== Infinity ? `<div style="font-size:11px;color:#777;margin:4px 0">Progress: ${Math.min(100, Math.floor(score / lvl.target * 100))}%</div>` : ''}
      <div class="btn-row">
        <button class="btn btn-retry" onclick="${retryAction}">RETRY</button>
        <button class="btn btn-back" onclick="showLevelSelect()">LEVELS</button>
      </div>
    `;
  }, 600);
}

// ─── PARTICLES ──────────────────────────────────────────
function spawnParticle(x, y, type) {
  const p = { x, y, type, life: 1 };
  if (type === 'exhaust') {
    p.vx = rand(-1.5, 1.5); p.vy = rand(2, 5); p.size = rand(2, 5);
    p.color = `hsla(${rand(90,130)},${rand(50,80)}%,${rand(35,55)}%,`; p.maxLife = rand(12, 25);
  } else if (type === 'nitro') {
    p.vx = rand(-2, 2); p.vy = rand(4, 10); p.size = rand(3, 8);
    p.color = `hsla(${rand(180,260)},100%,70%,`; p.maxLife = rand(15, 25);
  } else if (type === 'spark') {
    p.vx = rand(-4, 4); p.vy = rand(-4, 4); p.size = rand(1, 3);
    p.color = `hsla(40,100%,${rand(50,90)}%,`; p.maxLife = rand(10, 25);
  } else if (type === 'explosion') {
    p.vx = rand(-8, 8); p.vy = rand(-8, 8); p.size = rand(3, 10);
    p.color = `hsla(${rand(0,40)},100%,${rand(40,70)}%,`; p.maxLife = rand(20, 50);
  } else if (type === 'pickup') {
    p.vx = rand(-3, 3); p.vy = rand(-5, 1); p.size = rand(2, 5);
    p.color = `hsla(120,100%,60%,`; p.maxLife = rand(15, 30);
  } else if (type === 'oil') {
    p.vx = rand(-1, 1); p.vy = rand(-1, 1); p.size = rand(2, 4);
    p.color = `hsla(45,80%,50%,`; p.maxLife = rand(10, 20);
  }
  p.life = p.maxLife;
  particles.push(p);
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── SPAWN ──────────────────────────────────────────────
function spawnTraffic() {
  const lane = Math.floor(Math.random() * LANES);
  const tx = laneX(lane);
  for (const t of traffic) { if (Math.abs(t.x - tx) < 30 && t.y < 100) return; }
  const types = ['car', 'car', 'car', 'truck', 'sports'];
  const vtype = types[Math.floor(Math.random() * types.length)];
  const colors = ['#1E88E5','#FDD835','#43A047','#8E24AA','#FF8F00','#e0e0e0','#EF5350','#26C6DA','#FF7043'];
  const t = {
    x: tx, y: -90,
    w: vtype === 'truck' ? 44 : vtype === 'sports' ? 36 : 38,
    h: vtype === 'truck' ? 95 : vtype === 'sports' ? 65 : 70,
    speed: vtype === 'truck' ? speed * rand(0.2, 0.35) : vtype === 'sports' ? speed * rand(0.5, 0.75) : speed * rand(0.3, 0.55),
    color: colors[Math.floor(Math.random() * colors.length)],
    vtype, lane, passed: false,
    laneChangeTimer: rand(60, 200), changingLane: false, targetX: tx,
    braking: false,
  };
  traffic.push(t);
}

function spawnPickup() {
  const types = ['nitro', 'score', 'invincible', 'slowmo'];
  const weights = [4, 3, 1.5, 1.5];
  const total = weights.reduce((a, b) => a + b);
  let r = Math.random() * total, type;
  for (let i = 0; i < types.length; i++) { r -= weights[i]; if (r <= 0) { type = types[i]; break; } }
  type = type || 'nitro';
  const lane = Math.floor(Math.random() * LANES);
  pickups.push({ x: laneX(lane), y: -30, type, size: 18, bob: Math.random() * Math.PI * 2, collected: false });
}

function spawnObstacle() {
  const types = ['oil', 'barrier', 'pothole'];
  const type = types[Math.floor(Math.random() * types.length)];
  const lane = Math.floor(Math.random() * LANES);
  obstacles.push({
    x: laneX(lane), y: -40, type,
    w: type === 'barrier' ? LANE_W - 10 : 35,
    h: type === 'barrier' ? 16 : 35,
    active: true,
  });
}

// ─── UPDATE ─────────────────────────────────────────────
function update() {
  if (state !== 'playing') {
    updateParticles();
    if (shakeDur > 0) { shakeDur--; shakeX *= 0.9; shakeY *= 0.9; }
    if (flashAlpha > 0) flashAlpha *= 0.94;
    return;
  }

  frameCount++;
  const dRate = lvl ? lvl.diffRate : 6000;
  difficulty = Math.min(1, frameCount / dRate);
  const sMult = lvl ? lvl.speedMult : 1;
  const tMult = lvl ? lvl.trafficMult : 1;
  const oMult = lvl ? lvl.obstacleMult : 1;

  // Speed ramp (with upgrade)
  const maxSpd = (14 + getUpgradeVal('speed')) * sMult;
  baseSpeed = (5 + difficulty * 9) * sMult;
  baseSpeed = Math.min(baseSpeed, maxSpd);
  const speedMult = nitroActive ? 1.8 : 1;
  const slowMult = slowmo ? 0.5 : 1;
  speed = clamp(baseSpeed * speedMult * slowMult, 2, 30);

  // Input
  const lat = (nitroActive ? 7 : 5.5) + getUpgradeVal('handling');
  let steering = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) steering = -lat;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) steering = +lat;
  player.x += steering;
  player.tilt += (steering * 0.06 - player.tilt) * 0.2;

  // Nitro (with upgrades)
  const regenRate = 0.15 + getUpgradeVal('nitroRegen');
  if ((keys[' '] || keys['n'] || keys['N']) && nitro > 0 && nitroCooldown <= 0) {
    if (!nitroActive) sfxNitro();
    nitroActive = true;
    nitro = Math.max(0, nitro - 1.2);
    if (nitro <= 0) nitroCooldown = 30;
  } else {
    nitroActive = false;
    if (nitroCooldown > 0) nitroCooldown--;
    nitro = Math.min(nitroMax, nitro + regenRate);
  }

  // Timers
  if (invincibleTimer > 0) { invincibleTimer--; if (invincibleTimer <= 0) invincible = false; }
  if (slowmoTimer > 0) { slowmoTimer--; if (slowmoTimer <= 0) slowmo = false; }
  if (levelBannerTimer > 0) levelBannerTimer--;

  // Clamp
  player.x = clamp(player.x, ROAD_L + PLAYER_W / 2 + 6, ROAD_R - PLAYER_W / 2 - 6);
  roadOffset = (roadOffset + speed) % 50;

  // Score ticks
  if (frameCount % 6 === 0) score += Math.ceil(speed * 0.5);

  // Level complete check
  if (lvl && lvl.target !== Infinity && score >= lvl.target) {
    levelComplete();
    return;
  }

  // Spawn logic (scaled by level multipliers)
  const spawnRate = Math.max(14, (55 - difficulty * 35) / tMult);
  if (frameCount % Math.max(1, Math.floor(spawnRate)) === 0) spawnTraffic();
  if (frameCount % Math.max(1, Math.floor(rand(180, 350 - difficulty * 100))) === 0) spawnPickup();
  const obsRate = rand(200, 400 - difficulty * 150) / oMult;
  if (frameCount % Math.max(1, Math.floor(obsRate)) === 0) spawnObstacle();

  // Exhaust particles
  if (frameCount % 2 === 0) {
    spawnParticle(player.x - 8, player.y + PLAYER_H / 2, nitroActive ? 'nitro' : 'exhaust');
    spawnParticle(player.x + 8, player.y + PLAYER_H / 2, nitroActive ? 'nitro' : 'exhaust');
    if (nitroActive) spawnParticle(player.x + rand(-12, 12), player.y + PLAYER_H / 2 + 5, 'nitro');
  }

  // Trees
  for (const t of trees) {
    t.y += speed * 0.7;
    if (t.y > H + 30) {
      t.y = rand(-40, -10);
      t.side = Math.random() < 0.5 ? 'L' : 'R';
      t.type = Math.floor(Math.random() * 3);
      t.x = t.side === 'L' ? rand(10, ROAD_L - 20) : rand(ROAD_R + 20, W - 10);
    }
  }

  // Traffic AI
  for (let i = traffic.length - 1; i >= 0; i--) {
    const t = traffic[i];
    const relSpeed = speed - t.speed;
    t.y += relSpeed;

    t.laneChangeTimer--;
    if (t.laneChangeTimer <= 0 && !t.changingLane) {
      const playerLane = Math.floor((player.x - ROAD_L) / LANE_W);
      const sameLane = t.lane === playerLane;
      const playerBehind = player.y > t.y;
      const closeToPlayer = Math.abs(player.y - t.y) < 250;
      let shouldChange = Math.random() < 0.3 + difficulty * 0.3;
      if (sameLane && playerBehind && closeToPlayer && Math.random() < 0.15) {
        shouldChange = false;
      } else if (!sameLane && playerBehind && closeToPlayer && Math.random() < 0.25 + difficulty * 0.2) {
        t.lane = playerLane; shouldChange = true;
      }
      if (shouldChange) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        const newLane = clamp(t.lane + dir, 0, LANES - 1);
        if (newLane !== t.lane) {
          let blocked = false;
          for (const other of traffic) {
            if (other === t) continue;
            if (other.lane === newLane && Math.abs(other.y - t.y) < 120) { blocked = true; break; }
          }
          if (!blocked) { t.lane = newLane; t.changingLane = true; t.targetX = laneX(newLane); }
        }
      }
      t.laneChangeTimer = rand(40, 160 - difficulty * 60);
    }
    if (t.changingLane) {
      t.x += (t.targetX - t.x) * 0.06;
      if (Math.abs(t.x - t.targetX) < 2) { t.x = t.targetX; t.changingLane = false; }
    }

    t.braking = false;
    for (const other of traffic) {
      if (other === t) continue;
      if (Math.abs(other.x - t.x) < 25 && other.y < t.y && t.y - other.y < 130) {
        t.speed = Math.max(t.speed * 0.98, other.speed - 0.5);
        t.braking = true; break;
      }
    }

    if (!t.passed && t.y > player.y + PLAYER_H / 2) {
      t.passed = true;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      const pts = 10 * combo;
      score += pts;
      mowersAvoided++;
      sfxPass();
      addFloatingText(player.x, player.y - 50, `+${pts}`, combo >= 5 ? '#ffcc00' : '#4fc3f7');
      if (combo >= 5 && combo % 5 === 0) addFloatingText(player.x, player.y - 80, `x${combo} COMBO!`, '#ff4444');
    }

    if (t.y > H + 120) { traffic.splice(i, 1); continue; }

    if (rectHit(player.x, player.y, PLAYER_W - 4, PLAYER_H - 4, t.x, t.y, t.w - 4, t.h - 4)) {
      if (invincible) {
        for (let j = 0; j < 12; j++) spawnParticle(t.x, t.y, 'spark');
        score += 50;
        addFloatingText(t.x, t.y, 'SMASH +50', '#ff8800');
        traffic.splice(i, 1);
      } else if (armorHP > 0) {
        armorHP--;
        triggerShake(10, 16);
        flashAlpha = 0.5;
        invincible = true; invincibleTimer = 120;
        addFloatingText(player.x, player.y - 60, 'ARMOR SAVED!', '#FFD700');
        for (let j = 0; j < 12; j++) spawnParticle(t.x, t.y, 'spark');
        traffic.splice(i, 1);
      } else {
        gameOver();
        return;
      }
    }
  }

  // Pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.y += speed;
    p.bob += 0.08;
    if (p.y > H + 40) { pickups.splice(i, 1); continue; }
    if (!p.collected && rectHit(player.x, player.y, PLAYER_W, PLAYER_H, p.x, p.y, p.size * 2, p.size * 2)) {
      p.collected = true;
      sfxPickup();
      for (let j = 0; j < 10; j++) spawnParticle(p.x, p.y, 'pickup');
      if (p.type === 'nitro') {
        nitro = Math.min(nitroMax, nitro + 40);
        addFloatingText(p.x, p.y, 'NITRO +40', '#00e5ff');
      } else if (p.type === 'score') {
        const pts = 100 + Math.floor(difficulty * 200);
        score += pts;
        addFloatingText(p.x, p.y, `+${pts}`, '#76ff03');
      } else if (p.type === 'invincible') {
        invincible = true; invincibleTimer = 240;
        addFloatingText(p.x, p.y, 'INVINCIBLE!', '#ffcc00');
        flashAlpha = 0.3;
      } else if (p.type === 'slowmo') {
        slowmo = true; slowmoTimer = 300;
        addFloatingText(p.x, p.y, 'SLOW-MO!', '#e040fb');
      }
      pickups.splice(i, 1);
    }
  }

  // Obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.y += speed;
    if (o.y > H + 60) { obstacles.splice(i, 1); continue; }
    if (o.active && rectHit(player.x, player.y, PLAYER_W - 6, PLAYER_H - 6, o.x, o.y, o.w, o.h)) {
      if (invincible) {
        for (let j = 0; j < 8; j++) spawnParticle(o.x, o.y, 'spark');
        obstacles.splice(i, 1);
        continue;
      }
      o.active = false;
      obstacleHits++;
      sfxObstacle();
      if (o.type === 'oil') {
        triggerShake(6, 12); player.x += rand(-40, 40); combo = 0;
        addFloatingText(o.x, o.y, 'OIL SLICK!', '#ffa000');
        for (let j = 0; j < 8; j++) spawnParticle(o.x, o.y, 'oil');
      } else if (o.type === 'barrier') {
        triggerShake(10, 16); speed = Math.max(3, speed * 0.5); combo = 0;
        addFloatingText(o.x, o.y, 'BARRIER!', '#ff5252');
        for (let j = 0; j < 10; j++) spawnParticle(o.x, o.y, 'spark');
      } else if (o.type === 'pothole') {
        triggerShake(8, 14); speed = Math.max(3, speed * 0.6); combo = 0;
        addFloatingText(o.x, o.y, 'POTHOLE!', '#ff8a65');
      }
    }
  }

  if (shakeDur > 0) { shakeDur--; shakeX *= 0.88; shakeY *= 0.88; }
  if (flashAlpha > 0) flashAlpha *= 0.96;
  updateParticles();

  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].life--;
    floatingTexts[i].y -= 1.5;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}

// ─── DRAW ───────────────────────────────────────────────
function draw() {
  const theme = lvl || LEVELS[0];
  ctx.save();
  if (shakeDur > 0) ctx.translate(rand(-shakeX, shakeX), rand(-shakeY, shakeY));

  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.2);
  skyGrad.addColorStop(0, theme.skyTop);
  skyGrad.addColorStop(1, theme.skyBot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (visible on dark levels)
  if (theme.night || theme.skyTop.charAt(1) === '0') {
    for (const s of bgStars) {
      const flicker = 0.5 + 0.5 * Math.sin((frameCount || 0) * 0.03 + s.b * 10);
      ctx.fillStyle = `rgba(255,255,255,${flicker * 0.7})`;
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
  }

  // Grass
  ctx.fillStyle = theme.grass;
  ctx.fillRect(0, 0, ROAD_L, H);
  ctx.fillRect(ROAD_R, 0, W - ROAD_R, H);
  for (let y = -50 + (roadOffset * 2) % 50; y < H; y += 50) {
    ctx.fillStyle = theme.grassAlt;
    ctx.fillRect(0, y, ROAD_L, 25);
    ctx.fillRect(ROAD_R, y, W - ROAD_R, 25);
  }

  // Rumble strips
  for (let y = -50 + (roadOffset * 2) % 30; y < H; y += 30) {
    ctx.fillStyle = theme.rumble;
    ctx.fillRect(ROAD_L - 6, y, 6, 15);
    ctx.fillRect(ROAD_R, y, 6, 15);
  }

  // Road
  const roadGrad = ctx.createLinearGradient(ROAD_L, 0, ROAD_R, 0);
  roadGrad.addColorStop(0, theme.road[0]);
  roadGrad.addColorStop(0.5, theme.road[1]);
  roadGrad.addColorStop(1, theme.road[2]);
  ctx.fillStyle = roadGrad;
  ctx.fillRect(ROAD_L, 0, ROAD_W, H);

  // Road texture
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for (let y = -50 + roadOffset % 12; y < H; y += 12) {
    for (let x = ROAD_L; x < ROAD_R; x += 20) {
      if ((x + y) % 24 === 0) ctx.fillRect(x, y, 10, 6);
    }
  }

  // Edge lines
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(ROAD_L, 0, 4, H);
  ctx.fillRect(ROAD_R - 4, 0, 4, H);

  // Lane dashes
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([24, 26]);
  ctx.lineDashOffset = -roadOffset;
  for (let i = 1; i < LANES; i++) {
    ctx.beginPath();
    ctx.moveTo(ROAD_L + i * LANE_W, 0);
    ctx.lineTo(ROAD_L + i * LANE_W, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Trees
  for (const t of trees) drawTree(t.x, t.y, t.type);
  // Obstacles
  for (const o of obstacles) drawObstacle(o);
  // Pickups
  for (const p of pickups) drawPickup(p);
  // Traffic
  for (const t of traffic) drawTrafficMower(t);

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color + alpha + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }

  // Player
  if (state === 'playing' || state === 'gameover' || state === 'levelComplete') drawPlayer();

  // Floating text
  for (const ft of floatingTexts) {
    const alpha = ft.life / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 18px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }

  // Flash overlay
  if (flashAlpha > 0.01) {
    ctx.fillStyle = invincible ? `rgba(255,215,0,${flashAlpha * 0.3})` : `rgba(255,60,60,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Night vision overlay
  if (theme.night && (state === 'playing' || state === 'gameover')) {
    const vg = ctx.createRadialGradient(player.x, player.y - 50, 60, player.x, player.y, 320);
    vg.addColorStop(0, 'rgba(0,0,10,0)');
    vg.addColorStop(0.5, 'rgba(0,0,10,0.4)');
    vg.addColorStop(1, 'rgba(0,0,10,0.88)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // Fog overlay
  if (theme.fog && (state === 'playing' || state === 'gameover')) {
    const fg = ctx.createRadialGradient(player.x, player.y, 80, player.x, player.y, 400);
    fg.addColorStop(0, 'rgba(180,190,200,0)');
    fg.addColorStop(0.5, 'rgba(180,190,200,0.25)');
    fg.addColorStop(1, 'rgba(180,190,200,0.55)');
    ctx.fillStyle = fg;
    ctx.fillRect(0, 0, W, H);
  }

  // Rain effect
  if (theme.rain && (state === 'playing' || state === 'gameover')) {
    ctx.strokeStyle = 'rgba(150,180,220,0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 80; i++) {
      const rx = (i * 37 + (frameCount || 0) * 3) % W;
      const ry = (i * 53 + (frameCount || 0) * 8) % H;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 3, ry + 15); ctx.stroke();
    }
  }

  ctx.restore();

  // HUD (not affected by shake)
  if (state === 'playing') {
    drawHUD();
    // Level banner
    if (levelBannerTimer > 0) {
      const alpha = Math.min(1, levelBannerTimer / 30);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, H / 2 - 50, W, 100);
      ctx.fillStyle = '#888';
      ctx.font = 'bold 13px Orbitron';
      ctx.textAlign = 'center';
      ctx.fillText(`LEVEL ${currentLevelIndex + 1}`, W / 2, H / 2 - 12);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px Orbitron';
      ctx.fillText(lvl.name.toUpperCase(), W / 2, H / 2 + 22);
      ctx.globalAlpha = 1;
    }
  }
}

// ─── DRAW: PLAYER MOWER ─────────────────────────────────
function drawPlayer() {
  const px = player.x, py = player.y;
  const hw = PLAYER_W / 2, hh = PLAYER_H / 2;
  const mColor = MOWER_COLORS[pData.selectedColor].hex;

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(player.tilt);

  if (invincible && (frameCount || 0) % 4 < 2) { ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 25; }

  // Nitro flame
  if (nitroActive) {
    const flameH = rand(25, 45);
    const grad = ctx.createLinearGradient(0, hh, 0, hh + flameH);
    grad.addColorStop(0, 'rgba(0,200,255,0.9)');
    grad.addColorStop(0.4, 'rgba(100,100,255,0.6)');
    grad.addColorStop(1, 'rgba(100,0,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-10, hh);
    ctx.quadraticCurveTo(-4, hh + flameH * 0.7, rand(-3, 3), hh + flameH);
    ctx.quadraticCurveTo(4, hh + flameH * 0.7, 10, hh);
    ctx.fill();
    const grad2 = ctx.createLinearGradient(0, hh, 0, hh + flameH * 0.6);
    grad2.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad2.addColorStop(1, 'rgba(0,150,255,0)');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.moveTo(-5, hh);
    ctx.quadraticCurveTo(0, hh + flameH * 0.4, 0, hh + flameH * 0.6);
    ctx.quadraticCurveTo(0, hh + flameH * 0.4, 5, hh);
    ctx.fill();
  }

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(3, 5, hw + 6, hh + 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rear wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(-hw - 3, hh - 18, 9, 18);
  ctx.fillRect(hw - 6, hh - 18, 9, 18);
  ctx.fillStyle = '#333';
  for (let wy = hh - 16; wy < hh - 2; wy += 4) {
    ctx.fillRect(-hw - 2, wy, 7, 2);
    ctx.fillRect(hw - 5, wy, 7, 2);
  }
  // Front wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(-hw + 2, -hh + 2, 7, 11);
  ctx.fillRect(hw - 9, -hh + 2, 7, 11);

  // Cutting deck
  ctx.fillStyle = '#455A64';
  ctx.beginPath();
  ctx.roundRect(-hw - 6, -hh, PLAYER_W + 12, 24, [6, 6, 0, 0]);
  ctx.fill();
  ctx.fillStyle = '#607D8B';
  ctx.fillRect(-hw - 4, -hh + 2, PLAYER_W + 8, 3);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(-10, -hh + 14, 6, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(10, -hh + 14, 6, 0, Math.PI * 2); ctx.stroke();

  // Body (player color)
  const bodyGrad = ctx.createLinearGradient(-hw, 0, hw, 0);
  bodyGrad.addColorStop(0, shadeColor(mColor, -40));
  bodyGrad.addColorStop(0.3, mColor);
  bodyGrad.addColorStop(0.7, mColor);
  bodyGrad.addColorStop(1, shadeColor(mColor, -40));
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(-hw + 1, -hh + 22, PLAYER_W - 2, PLAYER_H - 26, 4);
  ctx.fill();

  // Engine housing
  ctx.fillStyle = shadeColor(mColor, -30);
  ctx.fillRect(-10, -hh + 22, 20, 16);
  ctx.fillStyle = '#222';
  ctx.fillRect(-6, -hh + 25, 12, 5);
  ctx.fillStyle = shadeColor(mColor, -20);
  for (let vx = -4; vx <= 4; vx += 4) ctx.fillRect(vx, -hh + 31, 2, 5);

  // Exhaust pipe
  ctx.fillStyle = '#666';
  ctx.fillRect(hw - 3, -hh + 28, 6, 8);
  ctx.fillStyle = '#999';
  ctx.beginPath(); ctx.arc(hw, -hh + 28, 3, Math.PI, 0); ctx.fill();

  // Steering wheel
  ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, -hh + 46, 7, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#444';
  ctx.fillRect(-1.5, -hh + 38, 3, 8);

  // Seat
  ctx.fillStyle = '#5D4037';
  ctx.beginPath(); ctx.roundRect(-9, hh - 34, 18, 20, 5); ctx.fill();
  ctx.fillStyle = '#4E342E';
  ctx.beginPath(); ctx.roundRect(-8, hh - 38, 16, 10, [5, 5, 0, 0]); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(-6, hh - 30, 12, 10, 3); ctx.fill();

  // Grass clippings
  if (speed > 6 && (frameCount || 0) % 3 === 0) {
    ctx.fillStyle = `rgba(100,180,60,${0.3 + Math.random() * 0.3})`;
    for (let g = 0; g < 3; g++) ctx.fillRect(rand(-hw - 8, hw + 8), rand(-hh + 4, -hh + 20), rand(2, 4), rand(1, 3));
  }

  // Headlight
  ctx.fillStyle = '#FFEB3B'; ctx.shadowColor = '#FFEB3B'; ctx.shadowBlur = nitroActive ? 15 : 6;
  ctx.beginPath(); ctx.arc(0, -hh + 3, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // Taillights
  ctx.fillStyle = '#ff1744'; ctx.shadowColor = '#ff1744'; ctx.shadowBlur = 4;
  ctx.fillRect(-hw + 3, hh - 4, 6, 3);
  ctx.fillRect(hw - 9, hh - 4, 6, 3);
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ─── DRAW: TRAFFIC MOWER ────────────────────────────────
function drawTrafficMower(t) {
  ctx.save();
  ctx.translate(t.x, t.y);
  const hw = t.w / 2, hh = t.h / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(3, 4, hw + 4, hh + 1, 0, 0, Math.PI * 2); ctx.fill();

  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(-hw - 2, hh - 15, 8, 15);
  ctx.fillRect(hw - 6, hh - 15, 8, 15);
  ctx.fillRect(-hw + 2, -hh + 2, 6, 10);
  ctx.fillRect(hw - 8, -hh + 2, 6, 10);

  // Cutting deck
  ctx.fillStyle = '#546E7A';
  ctx.beginPath(); ctx.roundRect(-hw - 4, -hh, t.w + 8, t.vtype === 'truck' ? 26 : 20, [5, 5, 0, 0]); ctx.fill();
  ctx.fillStyle = '#607D8B'; ctx.fillRect(-hw - 2, -hh + 2, t.w + 4, 2);

  // Body
  const bGrad = ctx.createLinearGradient(-hw, 0, hw, 0);
  bGrad.addColorStop(0, shadeColor(t.color, -30));
  bGrad.addColorStop(0.5, t.color);
  bGrad.addColorStop(1, shadeColor(t.color, -30));
  ctx.fillStyle = bGrad;
  const deckH = t.vtype === 'truck' ? 24 : 18;
  ctx.beginPath(); ctx.roundRect(-hw + 1, -hh + deckH, t.w - 2, t.h - deckH - 4, 3); ctx.fill();

  // Engine
  ctx.fillStyle = shadeColor(t.color, -40);
  ctx.fillRect(-7, -hh + deckH, 14, 10);
  ctx.fillStyle = '#222';
  ctx.fillRect(-4, -hh + deckH + 2, 8, 4);

  // Truck grass catcher
  if (t.vtype === 'truck') {
    ctx.fillStyle = shadeColor(t.color, -50);
    ctx.beginPath(); ctx.roundRect(-hw + 4, hh - 20, t.w - 8, 16, 3); ctx.fill();
  }

  // Seat
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.roundRect(-7, hh - 30, 14, 16, 4); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.roundRect(-6, hh - 33, 12, 8, [4, 4, 0, 0]); ctx.fill();

  // Steering
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -hh + (t.vtype === 'truck' ? 40 : 34), 5, 0, Math.PI * 2); ctx.stroke();

  // Zero-turn bars
  if (t.vtype === 'sports') {
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-hw + 3, hh - 20); ctx.lineTo(-hw + 3, hh - 34); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hw - 3, hh - 20); ctx.lineTo(hw - 3, hh - 34); ctx.stroke();
  }

  // Headlight
  ctx.fillStyle = '#FFF9C4'; ctx.shadowColor = '#FFEB3B'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(0, -hh + 3, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // Taillights
  ctx.fillStyle = t.braking ? '#ff0000' : '#b71c1c';
  if (t.braking) { ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10; }
  ctx.fillRect(-hw + 3, hh - 4, 5, 3);
  ctx.fillRect(hw - 8, hh - 4, 5, 3);
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ─── DRAW: OBSTACLES ────────────────────────────────────
function drawObstacle(o) {
  if (o.type === 'oil') {
    ctx.fillStyle = 'rgba(30,20,10,0.7)';
    ctx.beginPath(); ctx.ellipse(o.x, o.y, 20, 16, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(100,80,40,0.3)';
    ctx.beginPath(); ctx.ellipse(o.x - 4, o.y - 3, 10, 7, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,50,0.6)';
    ctx.font = 'bold 14px Rajdhani'; ctx.textAlign = 'center';
    ctx.fillText('OIL', o.x, o.y + 5);
  } else if (o.type === 'barrier') {
    for (let bx = o.x - o.w / 2; bx < o.x + o.w / 2; bx += 12) {
      ctx.fillStyle = (Math.floor(bx / 12) % 2 === 0) ? '#ff6600' : '#fff';
      ctx.fillRect(bx, o.y - o.h / 2, 12, o.h);
    }
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.strokeRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
  } else if (o.type === 'pothole') {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(o.x, o.y, 18, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(o.x, o.y, 18, 14, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.ellipse(o.x, o.y, 12, 9, 0, 0, Math.PI * 2); ctx.fill();
  }
}

// ─── DRAW: PICKUPS ──────────────────────────────────────
function drawPickup(p) {
  const bob = Math.sin(p.bob) * 4;
  const pulse = 0.85 + 0.15 * Math.sin(p.bob * 2);
  const s = p.size * pulse;
  ctx.save();
  ctx.translate(p.x, p.y + bob);
  const colors = { nitro: '#00e5ff', score: '#76ff03', invincible: '#ffd600', slowmo: '#e040fb' };
  const c = colors[p.type] || '#fff';
  ctx.shadowColor = c; ctx.shadowBlur = 15;
  ctx.strokeStyle = c; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, s + 4, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = c; ctx.globalAlpha = 0.25;
  ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Orbitron';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const icons = { nitro: 'N', score: '$', invincible: '*', slowmo: 'S' };
  ctx.fillText(icons[p.type], 0, 1);
  ctx.restore();
}

// ─── DRAW: TREES ────────────────────────────────────────
function drawTree(x, y, type) {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x + 2, y + 14, 10, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#4E342E';
  ctx.fillRect(x - 3, y, 6, 14);
  if (type === 0) {
    ctx.fillStyle = '#1B5E20';
    ctx.beginPath(); ctx.arc(x, y - 4, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath(); ctx.arc(x - 3, y - 7, 10, 0, Math.PI * 2); ctx.fill();
  } else if (type === 1) {
    ctx.fillStyle = '#1B5E20';
    ctx.beginPath(); ctx.moveTo(x, y - 20); ctx.lineTo(x - 12, y + 2); ctx.lineTo(x + 12, y + 2); ctx.fill();
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath(); ctx.moveTo(x, y - 14); ctx.lineTo(x - 9, y + 2); ctx.lineTo(x + 9, y + 2); ctx.fill();
  } else {
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#388E3C';
    ctx.beginPath(); ctx.arc(x + 5, y - 2, 7, 0, Math.PI * 2); ctx.fill();
  }
}

// ─── DRAW: HUD ──────────────────────────────────────────
function drawHUD() {
  const pad = 14;

  // Top HUD bar
  const hudGrad = ctx.createLinearGradient(0, 0, 0, 58);
  hudGrad.addColorStop(0, 'rgba(0,0,0,0.75)');
  hudGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = hudGrad;
  ctx.fillRect(0, 0, W, 58);

  // Score
  ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Orbitron'; ctx.textAlign = 'left';
  ctx.fillText(score.toLocaleString(), pad, 28);

  // Coins
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 12px Orbitron';
  ctx.fillText(`C ${pData.coins + runCoins}`, pad, 46);

  // Level name + progress
  if (lvl && lvl.target !== Infinity) {
    const pct = clamp(score / lvl.target, 0, 1);
    // Progress bar (top center)
    const bw = 160, bh = 8;
    const bx = (W - bw) / 2, by = 10;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill();
    const pg = ctx.createLinearGradient(bx, 0, bx + bw * pct, 0);
    pg.addColorStop(0, '#4CAF50'); pg.addColorStop(1, '#8BC34A');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.roundRect(bx, by, bw * pct, bh, 4); ctx.fill();
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 9px Orbitron'; ctx.textAlign = 'center';
    ctx.fillText(`${Math.floor(pct * 100)}%`, W / 2, by + bh + 12);
  } else {
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 10px Orbitron'; ctx.textAlign = 'center';
    ctx.fillText('ENDLESS', W / 2, 20);
  }

  // Speed
  const kmh = Math.floor(speed * 18);
  ctx.textAlign = 'right';
  ctx.fillStyle = nitroActive ? '#00e5ff' : '#fff';
  ctx.font = 'bold 18px Orbitron';
  ctx.fillText(`${kmh}`, W - pad, 26);
  ctx.font = 'bold 10px Orbitron';
  ctx.fillStyle = '#888';
  ctx.fillText('km/h', W - pad, 40);

  // Combo
  if (combo >= 2) {
    ctx.textAlign = 'center';
    ctx.fillStyle = combo >= 10 ? '#ff4444' : combo >= 5 ? '#ffcc00' : '#4fc3f7';
    ctx.font = `bold ${16 + Math.min(combo, 10)}px Orbitron`;
    ctx.fillText(`x${combo}`, W / 2, 48);
  }

  // Nitro bar
  const barW = 200, barH = 12;
  const barX = (W - barW) / 2, barY = H - 28;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(barX - 2, barY - 2, barW + 4, barH + 4, 6); ctx.fill();
  const nitroPct = nitro / nitroMax;
  const nitroGrad = ctx.createLinearGradient(barX, 0, barX + barW * nitroPct, 0);
  nitroGrad.addColorStop(0, nitroActive ? '#00e5ff' : '#0288D1');
  nitroGrad.addColorStop(1, nitroActive ? '#7c4dff' : '#0277BD');
  ctx.fillStyle = nitroGrad;
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * nitroPct, barH, 4); ctx.fill();
  if (nitroActive) {
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 12;
    ctx.fillStyle = 'rgba(0,229,255,0.3)';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW * nitroPct, barH, 4); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = nitro <= 5 ? '#ff5252' : '#fff';
  ctx.font = 'bold 9px Orbitron'; ctx.textAlign = 'center';
  ctx.fillText(nitroActive ? 'NITRO!' : nitroCooldown > 0 ? 'RECHARGING' : 'N / SPACE', W / 2, barY + 10);

  // Armor indicator
  if (getUpgradeVal('armor') > 0) {
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 10px Orbitron'; ctx.textAlign = 'left';
    let armorStr = '';
    for (let i = 0; i < getUpgradeVal('armor'); i++) armorStr += i < armorHP ? '\u25C6' : '\u25C7';
    ctx.fillText(armorStr, pad, H - 22);
  }

  // Status indicators
  let statusY = H - 50;
  if (invincible) {
    ctx.fillStyle = `rgba(255,215,0,${0.6 + 0.4 * Math.sin(frameCount * 0.15)})`;
    ctx.font = 'bold 11px Orbitron'; ctx.textAlign = 'center';
    ctx.fillText(`INVINCIBLE ${Math.ceil(invincibleTimer / 60)}s`, W / 2, statusY);
    statusY -= 16;
  }
  if (slowmo) {
    ctx.fillStyle = `rgba(224,64,251,${0.6 + 0.4 * Math.sin(frameCount * 0.12)})`;
    ctx.font = 'bold 11px Orbitron'; ctx.textAlign = 'center';
    ctx.fillText(`SLOW-MO ${Math.ceil(slowmoTimer / 60)}s`, W / 2, statusY);
  }

  // Speedometer arc
  const cx = W - 46, cy = H - 50, r = 24;
  const speedPct = clamp(speed / 25, 0, 1);
  const startA = Math.PI * 0.75, endA = Math.PI * 2.25;
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r, startA, endA); ctx.stroke();
  ctx.strokeStyle = speedPct > 0.8 ? '#ff4444' : speedPct > 0.5 ? '#ffcc00' : '#4CAF50';
  ctx.beginPath(); ctx.arc(cx, cy, r, startA, startA + (endA - startA) * speedPct); ctx.stroke();
  const needleA = startA + (endA - startA) * speedPct;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(needleA) * (r - 5), cy + Math.sin(needleA) * (r - 5)); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
}

function shadeColor(color, amount) {
  let r = parseInt(color.slice(1, 3), 16) + amount;
  let g = parseInt(color.slice(3, 5), 16) + amount;
  let b = parseInt(color.slice(5, 7), 16) + amount;
  r = clamp(r, 0, 255); g = clamp(g, 0, 255); b = clamp(b, 0, 255);
  return `rgb(${r},${g},${b})`;
}

// ─── GAME LOOP ──────────────────────────────────────────
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

showMainMenu();
requestAnimationFrame(gameLoop);
</script>
